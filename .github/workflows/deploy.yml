name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/aml-shield-main
            git pull origin main
            docker build -t aml-shield:v1 .
            docker rm -f aml-shield
            docker run -d -p 8000:8000 --restart unless-stopped --name aml-shield aml-shield:v1
